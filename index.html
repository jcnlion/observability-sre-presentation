<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Observability Presentation</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      /* ── Base Slide Transitions ── */
      .slide { display: none; animation: fadeIn 0.4s ease-out; }
      .slide.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      /* ── Clickable Card (Accordion) ── */
      .card-expandable {
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        position: relative;
      }
      .card-expandable:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0,163,224,0.25);
        border-color: var(--accent-blue, #00A3E0);
      }
      .card-expandable::after {
        content: '▼ click for details';
        position: absolute;
        bottom: 0.4rem;
        right: 0.8rem;
        font-size: 0.65rem;
        color: var(--accent-blue, #00A3E0);
        opacity: 0.7;
        letter-spacing: 0.05em;
      }
      .card-expandable.open::after { content: '▲ close'; }

      .card-detail {
        display: none;
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--text-muted, #94a3b8);
        animation: expandIn 0.25s ease-out;
      }
      .card-detail.visible { display: block; }
      @keyframes expandIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

      .card-detail code {
        background: rgba(0,0,0,0.4);
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.8rem;
        color: #7dd3fc;
      }
      .card-detail ul { padding-left: 1.2rem; margin-top: 0.4rem; }
      .card-detail li { margin-bottom: 0.3rem; }
      .card-detail .example-badge {
        display: inline-block;
        background: rgba(0,163,224,0.15);
        border: 1px solid rgba(0,163,224,0.35);
        border-radius: 4px;
        padding: 0.2rem 0.5rem;
        font-size: 0.75rem;
        margin: 0.3rem 0;
        color: #7dd3fc;
      }

      /* ── Clickable Flow Node (Modal) ── */
      .flow-node-clickable {
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
      }
      .flow-node-clickable:hover {
        transform: scale(1.07);
        box-shadow: 0 6px 20px rgba(0,163,224,0.4);
        border-color: var(--accent-blue, #00A3E0);
        background: rgba(0,163,224,0.12);
      }
      .flow-node-clickable .click-hint {
        display: block;
        font-size: 0.6rem;
        color: var(--accent-blue, #00A3E0);
        opacity: 0.8;
        margin-top: 0.2rem;
        letter-spacing: 0.05em;
      }

      /* ── Modal Overlay ── */
      #otel-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      #otel-modal-overlay.open { display: flex; }

      #otel-modal {
        background: #0f172a;
        border: 1px solid rgba(0,163,224,0.4);
        border-radius: 16px;
        padding: 2rem;
        max-width: 640px;
        width: 100%;
        max-height: 85vh;
        overflow-y: auto;
        position: relative;
        animation: modalIn 0.28s cubic-bezier(0.22,1,0.36,1);
        box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      }
      @keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

      #otel-modal h3 { margin: 0 0 0.25rem 0; font-size: 1.25rem; color: #e2e8f0; }
      #otel-modal .modal-subtitle { color: var(--accent-blue, #00A3E0); font-size: 0.85rem; margin-bottom: 1.25rem; }
      #otel-modal .modal-section { margin-bottom: 1.2rem; }
      #otel-modal .modal-section h4 { font-size: 0.95rem; color: #cbd5e1; margin-bottom: 0.4rem; }
      #otel-modal .modal-section p,
      #otel-modal .modal-section li { font-size: 0.875rem; color: #94a3b8; line-height: 1.6; }
      #otel-modal .modal-section ul { padding-left: 1.2rem; }
      #otel-modal .modal-section li { margin-bottom: 0.3rem; }
      #otel-modal pre {
        background: rgba(0,0,0,0.5);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.78rem;
        overflow-x: auto;
        color: #7dd3fc;
        margin-top: 0.5rem;
      }
      #otel-modal-close {
        position: absolute;
        top: 1rem; right: 1rem;
        background: rgba(255,255,255,0.08);
        border: none;
        color: #94a3b8;
        width: 2rem; height: 2rem;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
      }
      #otel-modal-close:hover { background: rgba(255,255,255,0.18); }
      .modal-tag {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        font-size: 0.72rem;
        font-weight: 600;
        margin-right: 0.4rem;
        margin-bottom: 0.5rem;
      }
      .tag-blue { background: rgba(0,163,224,0.2); color: #7dd3fc; border: 1px solid rgba(0,163,224,0.3); }
      .tag-green { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
      .tag-orange { background: rgba(251,146,60,0.15); color: #fdba74; border: 1px solid rgba(251,146,60,0.3); }
      .tag-purple { background: rgba(168,85,247,0.15); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.3); }
    </style>
</head>
<body>
    <!-- ── Modal Overlay ── -->
    <div id="otel-modal-overlay">
      <div id="otel-modal">
        <button id="otel-modal-close" onclick="closeModal()">✕</button>
        <div id="otel-modal-body"><!-- filled dynamically --></div>
      </div>
    </div>

    <div class="presentation-container">
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
        
        <div class="slide-content" id="slide-container">
            <!-- Slides will be inserted here -->
        </div>

        <div class="controls">
            <span style="color: var(--text-muted)" id="slide-counter">Slide 1 of X</span>
            <div style="display: flex; gap: 1rem">
                <button class="btn" id="btn-prev">◀️ Prev</button>
                <button class="btn btn-primary" id="btn-next">Next ▶️</button>
            </div>
        </div>
    </div>

    <script>
      /* ════════════════════════════════════════════
         Modal data for flow-node clicks
         ════════════════════════════════════════════ */
      const modalData = {
        'app-pod': {
          title: '📦 Application Pod',
          subtitle: 'Where logs are born — stdout/stderr',
          sections: [
            {
              heading: 'ทำงานอย่างไร',
              text: 'ทุก application ใน Kubernetes เขียน log ออกมาที่ <code>stdout</code> และ <code>stderr</code>. Kubernetes จะดักจับ stream นี้และเก็บไว้ที่ Node ในรูปแบบไฟล์ <code>.log</code>'
            },
            {
              heading: 'Best Practice',
              bullets: [
                'Log เป็น <strong>JSON structured</strong> เสมอ (ไม่ใช่ plain text) เพื่อให้ parse ได้ง่าย',
                'ใส่ <code>traceId</code>, <code>spanId</code>, <code>userId</code> ในทุก log line',
                'ห้าม log ข้อมูล sensitive เช่น password, token, card number (PII)'
              ]
            },
            {
              heading: 'ตัวอย่าง Structured Log',
              code: `{
  "timestamp": "2025-07-14T06:00:00Z",
  "level": "ERROR",
  "service": "transfer-service",
  "traceId": "4bf92f35-77b3-4da6",
  "userId": "u-9982",
  "action": "transfer",
  "status": "failed",
  "reason": "insufficient_balance",
  "amount": 50000
}`
            }
          ]
        },
        'k8s-node': {
          title: '🖥️ Kubernetes Node',
          subtitle: 'Log storage location: /var/log/containers/',
          sections: [
            {
              heading: 'Log ถูกเก็บที่ไหน',
              text: 'Kubernetes runtime (containerd/Docker) จะ redirect stdout/stderr ไปเก็บที่ <code>/var/log/containers/&lt;pod-name&gt;.log</code> บน Node นั้น ๆ'
            },
            {
              heading: 'ปัญหาถ้าไม่มี Log Collector',
              bullets: [
                'Log หายเมื่อ Pod ถูก evict หรือ restart',
                'ต้อง SSH เข้า Node ทีละเครื่องเพื่อดู log',
                'ไม่มีการ aggregate ข้าม Node ได้'
              ]
            },
            {
              heading: 'Node Log Rotation',
              text: 'Kubernetes ตั้งค่า log rotation อัตโนมัติ ถ้า log file ใหญ่เกิน limit (default ~10MB, 5 files) จะถูก rotate ทิ้ง ดังนั้น <strong>ต้องมี agent ดึง log ออกก่อนที่จะถูก rotate</strong>'
            }
          ]
        },
        'daemonset': {
          title: '🔄 DaemonSet Log Agent',
          subtitle: 'Fluent Bit / Fluentd / Promtail',
          sections: [
            {
              heading: 'ทำไมถึงเป็น DaemonSet?',
              text: 'DaemonSet คือ Kubernetes workload ที่รัน <strong>1 Pod ต่อ 1 Node</strong> เสมอ เมื่อ Node ใหม่เข้า cluster, DaemonSet Pod จะถูก schedule ขึ้น Node นั้นอัตโนมัติ — ไม่มี Node ไหนขาด log collection'
            },
            {
              heading: 'เปรียบเทียบ Agent',
              bullets: [
                '<strong>Fluent Bit</strong> — เบาที่สุด (< 450KB RAM), เขียนด้วย C, เหมาะกับ K8s production',
                '<strong>Fluentd</strong> — plugin ecosystem ใหญ่กว่า แต่หนักกว่า (Ruby-based)',
                '<strong>Promtail</strong> — ใช้คู่กับ Grafana Loki โดยเฉพาะ'
              ]
            },
            {
              heading: 'Data Enrichment ที่ได้ฟรี',
              bullets: [
                'namespace, pod_name, container_name',
                'node_name, pod_ip',
                'labels และ annotations ของ Pod',
                'timestamp normalization'
              ]
            }
          ]
        },
        'kafka': {
          title: '📨 Kafka / Pub/Sub Message Broker',
          subtitle: 'Buffer ขนาดใหญ่ก่อนส่ง storage',
          sections: [
            {
              heading: 'ทำไมต้องมี Message Broker?',
              text: 'ถ้าส่ง log ตรงจาก Fluent Bit → Elasticsearch/S3 เมื่อ backend ล่มหรือ latency สูง, Fluent Bit จะ backpressure กลับไปที่ Pod — ทำให้ application ช้าหรือ crash ได้'
            },
            {
              heading: 'ประโยชน์ของ Kafka',
              bullets: [
                '<strong>Decoupling</strong> — Producer (agent) ไม่รู้จัก Consumer (storage)',
                '<strong>Durability</strong> — Log ถูกเก็บใน Kafka ได้ถึง 7 วัน (configurable)',
                '<strong>Fan-out</strong> — Consumer group หลายกลุ่มอ่าน topic เดียวกันได้ (Elasticsearch + S3 + Datadog พร้อมกัน)',
                '<strong>Replay</strong> — ถ้า Elasticsearch ล่ม สามารถ replay log ย้อนหลังได้'
              ]
            },
            {
              heading: 'GCP Pub/Sub vs Apache Kafka',
              bullets: [
                'GCP Pub/Sub — Managed fully, ไม่ต้อง maintain, ราคาตาม message',
                'Apache Kafka (MSK บน AWS) — Control เต็มที่, throughput สูงกว่า, ต้อง manage เอง'
              ]
            }
          ]
        },
        'otel': {
          title: '🔭 OpenTelemetry Collector',
          subtitle: 'ทำไมต้องมีก่อน S3?',
          sections: [
            {
              heading: '🔑 เหตุผลหลักที่ต้องมี OTel ก่อน S3',
              bullets: [
                '<strong>Filter & Scrub PII</strong> — ลบ password, card number, token ออกก่อนเก็บ S3 (compliance: PDPA/GDPR)',
                '<strong>Fan-out multi-destination</strong> — ส่ง 1 stream ไปหลาย backend พร้อมกัน (S3 + Datadog + OpenSearch) โดยไม่ต้องมี agent หลายตัว',
                '<strong>Format transformation</strong> — แปลง log format ให้ตรงกับ destination (JSON → Parquet สำหรับ Athena query)',
                '<strong>Sampling Traces</strong> — เก็บแค่ 10% ของ success trace เพื่อลด cost, เก็บ 100% ของ error trace',
                '<strong>Vendor-agnostic</strong> — เปลี่ยนจาก Datadog เป็น OpenSearch โดยแก้แค่ config ไม่ต้อง redeploy app'
              ]
            },
            {
              heading: 'OTel Collector Config ตัวอย่าง',
              code: `receivers:
  kafka:
    brokers: ["kafka:9092"]
    topic: app-logs

processors:
  filter:                      # ❶ กรอง log DEBUG ออก
    logs:
      exclude:
        match_type: regexp
        bodies: ["^DEBUG"]
  redaction:                   # ❷ Scrub PII
    allow_all_keys: true
    blocked_values: ["\\d{16}"] # ลบ card number

exporters:
  awss3:                       # ❸ เก็บ cold storage
    s3uploader:
      bucket: prod-logs-cold
  datadog:                     # ❹ hot search
    api:
      key: \${DD_API_KEY}`
            },
            {
              heading: 'ถ้าไม่มี OTel และส่งตรงสู่ S3?',
              bullets: [
                'เก็บ PII ใน S3 — ผิด PDPA/GDPR',
                'S3 cost สูงเพราะเก็บ DEBUG/TRACE log ที่ไม่จำเป็น',
                'ต้องการ agent แยกสำหรับแต่ละ destination (Datadog agent + Fluent Bit to S3 + ...)',
                'เปลี่ยน backend = redeploy app ทุกตัว'
              ]
            }
          ]
        },
        's3-storage': {
          title: '🗄️ Cloud Logging / S3 Storage',
          subtitle: 'Cold & Hot Storage Strategy',
          sections: [
            {
              heading: 'Hot vs Cold Storage',
              bullets: [
                '<strong>Hot (Cloud Logging / Datadog)</strong> — query เร็ว, real-time search, ราคาแพง → เก็บ 7-30 วัน',
                '<strong>Cold (S3 / GCS)</strong> — ราคาถูกมาก ($0.023/GB/month), query ช้ากว่า → เก็บ 1-7 ปี (compliance)'
              ]
            },
            {
              heading: 'S3 Cost Optimization',
              bullets: [
                'ใช้ S3 Intelligent-Tiering ย้าย log อัตโนมัติ Standard → Glacier',
                'compress log เป็น .gz ก่อน upload (ลด size 70-90%)',
                'partition ตาม year/month/day/service เพื่อ Athena query เร็วขึ้น'
              ]
            },
            {
              heading: 'S3 Partition Structure',
              code: `s3://prod-logs/
  year=2025/
    month=07/
      day=14/
        service=transfer/
          logs-00001.json.gz`
            }
          ]
        }
      };

      /* ════════════════════════════════════════════
         Accordion data for card clicks
         ════════════════════════════════════════════ */
      // injected inline via data-detail attribute

      /* ══ Modal functions ══ */
      function openModal(key) {
        const data = modalData[key];
        if (!data) return;
        const body = document.getElementById('otel-modal-body');
        let html = `<h3>${data.title}</h3><p class="modal-subtitle">${data.subtitle}</p>`;
        data.sections.forEach(s => {
          html += `<div class="modal-section">`;
          html += `<h4>${s.heading}</h4>`;
          if (s.text) html += `<p>${s.text}</p>`;
          if (s.bullets) {
            html += `<ul>${s.bullets.map(b => `<li>${b}</li>`).join('')}</ul>`;
          }
          if (s.code) html += `<pre>${s.code}</pre>`;
          html += `</div>`;
        });
        body.innerHTML = html;
        document.getElementById('otel-modal-overlay').classList.add('open');
      }
      function closeModal() {
        document.getElementById('otel-modal-overlay').classList.remove('open');
      }
      document.getElementById('otel-modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('otel-modal-overlay')) closeModal();
      });

      /* ══ Accordion functions ══ */
      function toggleCard(el) {
        const detail = el.querySelector('.card-detail');
        if (!detail) return;
        const isOpen = detail.classList.contains('visible');
        detail.classList.toggle('visible', !isOpen);
        el.classList.toggle('open', !isOpen);
      }

      /* ════════════════════════════════════════════
         SLIDES
         ════════════════════════════════════════════ */
      const slides = [
        /* 1: Title */
        `<div class="title-slide">
          <div style="font-size: 80px; margin-bottom: 2rem">📊</div>
          <h1>Observability for SREs</h1>
          <p>Mastering Metrics, Logs &amp; Traces on GCP &amp; AWS</p>
          <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <span class="tag tag-gcp">Google Cloud</span>
            <span class="tag tag-aws">AWS</span>
          </div>
          <p style="margin-top:2rem;font-size:0.8rem;color:var(--text-muted)">💡 คลิกที่กล่องสีใด ๆ เพื่อดูรายละเอียดเพิ่มเติม</p>
        </div>`,

        /* 2: 3 Pillars */
        `<div>
          <h2>The 3 Pillars of Observability</h2>
          <p style="color: var(--text-muted); margin-bottom: 2rem">Why it's more than just monitoring.</p>
          <div class="grid-2" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))">
            <div class="card card-expandable" onclick="toggleCard(this)">
              <div class="icon-box" style="background: rgba(0, 163, 224, 0.2); color: #00A3E0"><span style="font-size: 24px">📈</span></div>
              <h3>Metrics</h3>
              <p>Numeric data measured over intervals of time. (e.g. CPU Usage, Request Rate, Transfer Success Rate)</p>
              <div class="card-detail">
                <p><strong>ตัวอย่าง Metric types:</strong></p>
                <ul>
                  <li><strong>Counter</strong> — นับสะสมเพิ่มขึ้นอย่างเดียว เช่น total_requests</li>
                  <li><strong>Gauge</strong> — ค่าปัจจุบัน ขึ้นลงได้ เช่น memory_usage_mb</li>
                  <li><strong>Histogram</strong> — distribution ของค่า เช่น request_latency_seconds (P50/P95/P99)</li>
                </ul>
                <span class="example-badge">🔧 เครื่องมือ: Prometheus, CloudWatch, Datadog Metrics</span>
              </div>
            </div>
            <div class="card card-expandable" onclick="toggleCard(this)">
              <div class="icon-box" style="background: rgba(0, 86, 157, 0.2); color: #00A3E0"><span style="font-size: 24px">💾</span></div>
              <h3>Logs</h3>
              <p>Immutable, timestamped record of discrete events. Rich context but high volume. Used for deep debugging.</p>
              <div class="card-detail">
                <p><strong>Log Levels (ลำดับความรุนแรง):</strong></p>
                <ul>
                  <li><code>DEBUG</code> — รายละเอียดสูง ใช้ development เท่านั้น</li>
                  <li><code>INFO</code> — flow ปกติ เช่น "transfer completed"</li>
                  <li><code>WARN</code> — ผิดปกติแต่ยังทำงานได้</li>
                  <li><code>ERROR</code> — บันทึกเมื่อ exception เกิดขึ้น</li>
                  <li><code>FATAL</code> — system หยุดทำงาน</li>
                </ul>
                <span class="example-badge">💡 Production ควร set level INFO หรือ WARN เพื่อลด cost</span>
              </div>
            </div>
            <div class="card card-expandable" onclick="toggleCard(this)">
              <div class="icon-box" style="background: rgba(0, 86, 157, 0.2); color: #00A3E0"><span style="font-size: 24px">📊</span></div>
              <h3>Traces</h3>
              <p>A representation of a series of causally related distributed events. End-to-end flow across microservices.</p>
              <div class="card-detail">
                <p><strong>โครงสร้าง Trace:</strong></p>
                <ul>
                  <li><strong>Trace</strong> = การเดินทางทั้งหมด 1 request (มี Trace ID เดียว)</li>
                  <li><strong>Span</strong> = operation ย่อย เช่น DB query, HTTP call (มี Span ID ของตัวเอง)</li>
                  <li><strong>Parent-Child</strong> — Span ลูกรู้จัก parent Span ID ทำให้ต่อสายได้</li>
                </ul>
                <span class="example-badge">🔧 เครื่องมือ: Jaeger, Tempo, Datadog APM, AWS X-Ray</span>
              </div>
            </div>
          </div>
        </div>`,

        /* 3: Four Golden Signals */
        `<div>
          <h2>The Four Golden Signals</h2>
          <p style="color: var(--text-muted); margin-bottom: 2rem">Google's foundational metrics for SRE.</p>
          <div class="grid-2">
            <div class="card card-expandable" onclick="toggleCard(this)">
              <h4>1. Latency (ความหน่วง) ⏱️</h4>

      /* ════════════════════════════════════════════
         Slide engine
         ════════════════════════════════════════════ */
      let currentSlide = 0;
      const container = document.getElementById('slide-container');
      const progressBar = document.getElementById('progress-bar');
      const slideCounter = document.getElementById('slide-counter');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      slides.forEach((htmlContent, index) => {
        const div = document.createElement('div');
        div.className = 'slide';
        div.id = `slide-${index}`;
        div.innerHTML = htmlContent;
        container.appendChild(div);
      });

      function updateSlide() {
        document.querySelectorAll('.slide').forEach((el, index) => {
          el.classList.toggle('active', index === currentSlide);
        });
        btnPrev.disabled = currentSlide === 0;
        btnNext.disabled = currentSlide === slides.length - 1;
        const progress = ((currentSlide + 1) / slides.length) * 100;
        progressBar.style.width = `${progress}%`;
        slideCounter.textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
      }

      btnPrev.addEventListener('click', () => { if (currentSlide > 0) { currentSlide--; updateSlide(); } });
      btnNext.addEventListener('click', () => { if (currentSlide < slides.length - 1) { currentSlide++; updateSlide(); } });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) { currentSlide++; updateSlide(); }
        if (e.key === 'ArrowLeft' && currentSlide > 0) { currentSlide--; updateSlide(); }
        if (e.key === 'Escape') closeModal();
      });

      updateSlide();
    </script>
