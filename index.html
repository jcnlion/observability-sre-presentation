      /* в”Җв”Җ Base Slide Transitions в”Җв”Җ */
      .slide { display: none; animation: fadeIn 0.4s ease-out; }
      .slide.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      /* в”Җв”Җ Clickable Card (Accordion) в”Җв”Җ */
      .card-expandable {
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        position: relative;
      }
      .card-expandable:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0,163,224,0.25);
        border-color: var(--accent-blue, #00A3E0);
      }
      .card-expandable::after {
        content: 'в–ј click for details';
        position: absolute;
        bottom: 0.4rem;
        right: 0.8rem;
        font-size: 0.65rem;
        color: var(--accent-blue, #00A3E0);
        opacity: 0.7;
        letter-spacing: 0.05em;
      }
      .card-expandable.open::after { content: 'в–І close'; }

      .card-detail {
        display: none;
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--text-muted, #94a3b8);
        animation: expandIn 0.25s ease-out;
      }
      .card-detail.visible { display: block; }
      @keyframes expandIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

      .card-detail code {
        background: rgba(0,0,0,0.4);
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.8rem;
        color: #7dd3fc;
      }
      .card-detail ul { padding-left: 1.2rem; margin-top: 0.4rem; }
      .card-detail li { margin-bottom: 0.3rem; }
      .card-detail .example-badge {
        display: inline-block;
        background: rgba(0,163,224,0.15);
        border: 1px solid rgba(0,163,224,0.35);
        border-radius: 4px;
        padding: 0.2rem 0.5rem;
        font-size: 0.75rem;
        margin: 0.3rem 0;
        color: #7dd3fc;
      }

        display: block;
        font-size: 0.6rem;
        color: var(--accent-blue, #00A3E0);
        opacity: 0.8;
        margin-top: 0.2rem;
        letter-spacing: 0.05em;
      }

      /* в”Җв”Җ Modal Overlay в”Җв”Җ */
      #otel-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      #otel-modal-overlay.open { display: flex; }

        background: #0f172a;
        border: 1px solid rgba(0,163,224,0.4);
        border-radius: 16px;
        padding: 2rem;
        max-width: 640px;
        width: 100%;
        max-height: 85vh;
        overflow-y: auto;
        position: relative;
        animation: modalIn 0.28s cubic-bezier(0.22,1,0.36,1);
        box-shadow: 0 24px 64px rgba(0,0,0,0.6);

      #otel-modal .modal-subtitle { color: var(--accent-blue, #00A3E0); font-size: 0.85rem; margin-bottom: 1.25rem; }
      #otel-modal .modal-section { margin-bottom: 1.2rem; }

      #otel-modal .modal-section p,

      #otel-modal .modal-section ul { padding-left: 1.2rem; }
      #otel-modal .modal-section li { margin-bottom: 0.3rem; }
      #otel-modal pre {
        background: rgba(0,0,0,0.5);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.78rem;
        overflow-x: auto;
        color: #7dd3fc;
        margin-top: 0.5rem;
      }
      #otel-modal-close {
        position: absolute;
        top: 1rem; right: 1rem;
        background: rgba(255,255,255,0.08);
        border: none;
        color: #94a3b8;
        width: 2rem; height: 2rem;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        display: flex; align-items: center; justify-content: center;

      .modal-tag {

        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        font-size: 0.72rem;
        font-weight: 600;
        margin-right: 0.4rem;

</head>

              <p>Log Router а№ғаёҷ Cloud Logging аёҒаёіаё«аёҷаё”аё§а№ҲаёІ log а№ғаё”аёҲаё°аёӘа№ҲаёҮа№„аёӣаё—аёөа№Ҳа№„аё«аёҷ</p>
              <div class="card-detail">
                <p><strong>аёӘаёЈа№үаёІаёҮ Log Sink аёңа№ҲаёІаёҷ gcloud:</strong></p>
                <pre style="background:rgba(0,0,0,0.4);padding:0.6rem;border-radius:6px;font-size:0.75rem;color:#7dd3fc"># Sink а№„аёӣ BigQuery (analytics)
gcloud logging sinks create prod-bq-sink \
  bigquery.googleapis.com/projects/MY_PROJECT/datasets/prod_logs \
  --log-filter='resource.type="k8s_container" AND severity>=ERROR'

# Sink а№„аёӣ GCS (cold archive)

  storage.googleapis.com/my-log-archive-bucket \
  --log-filter='resource.type="k8s_container"'

# Sink а№„аёӣ Pub/Sub (streaming)

  pubsub.googleapis.com/projects/MY_PROJECT/topics/app-logs \
  --log-filter='jsonPayload.service="transfer-service"'</pre>

              <h4>рҹ“Ҡ BigQuery Log Analytics вҖ” Query аё•аёұаё§аёӯаёўа№ҲаёІаёҮ</h4>
              <p>Query log аёҡаёҷ BigQuery а№„аё”а№үа№Ӯаё”аёўаё•аёЈаёҮ вҖ” а№Җаё«аёЎаёІаё°аёӘаёіаё«аёЈаёұаёҡ ad-hoc analysis а№ҒаёҘаё° report</p>
              <div class="card-detail">
                <pre style="background:rgba(0,0,0,0.4);padding:0.6rem;border-radius:6px;font-size:0.75rem;color:#7dd3fc">-- Error rate аё•а№Ҳаёӯ service а№ғаёҷ 1 аёҠаёұа№Ҳаё§а№ӮаёЎаёҮаё—аёөа№Ҳаёңа№ҲаёІаёҷаёЎаёІ
SELECT
  JSON_VALUE(jsonPayload.service) AS service,
  COUNT(*) AS total,
  COUNTIF(severity = 'ERROR') AS errors,
  ROUND(COUNTIF(severity = 'ERROR') / COUNT(*) * 100, 2) AS error_pct
FROM \`my-project.prod_logs.k8s_container\`
WHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 1 HOUR)
GROUP BY service
ORDER BY error_pct DESC;</pre>

              <h4>рҹ§  Grail Data Lakehouse вҖ” Storage Engine</h4>
              <p>Dynatrace а№ғаёҠа№ү Grail а№Ғаё—аёҷ Elasticsearch вҖ” query а№„аё”а№үаё—аёұа№үаёҮ Metrics, Logs, Traces а№ғаёҷаё—аёөа№Ҳа№Җаё”аёөаёўаё§</p>
              <div class="card-detail">
                <p><strong>DQL (Dynatrace Query Language) аё•аёұаё§аёӯаёўа№ҲаёІаёҮ:</strong></p>
                <pre style="background:rgba(0,0,0,0.4);padding:0.6rem;border-radius:6px;font-size:0.75rem;color:#7dd3fc">// аё«аёІ ERROR log аёӮаёӯаёҮ transfer-service а№ғаёҷ 1 аёҠаёұа№Ҳаё§а№ӮаёЎаёҮ
fetch logs
| filter service.name == "transfer-service"
  and loglevel == "ERROR"
| filter timestamp > now() - 1h
| summarize count = count(), by: bin(timestamp, 5m)
| sort timestamp asc</pre>
                <p style="margin-top:0.5rem"><strong>Grail vs Elasticsearch:</strong></p>
                <ul>
                  <li>Grail вҖ” а№„аёЎа№Ҳаё•а№үаёӯаёҮ pre-define schema, query а№„аё”а№үаё—аёёаёҒ field а№Ӯаё”аёўа№„аёЎа№Ҳаё•а№үаёӯаёҮ index аёҒа№Ҳаёӯаёҷ</li>
                  <li>Retention: Metrics 15 months, Logs 35 days (default), Traces 10 years</li>
                  <li>аёЈаёІаё„аёІ: аё„аёҙаё”аё•аёІаёЎ DEM (Digital Experience Monitoring) unit а№„аёЎа№Ҳа№ғаёҠа№Ҳ per GB</li>
                </ul>

              <p>Splunk аёҲаёұаё”аёҒаёІаёЈ storage lifecycle аё”а№үаё§аёў bucket аё—аёөа№Ҳаёўа№үаёІаёўаё•аёІаёЎаёӯаёІаёўаёёаёӯаёұаё•а№ӮаёҷаёЎаёұаё•аёҙ</p>

                <pre style="background:rgba(0,0,0,0.4);padding:0.6rem;border-radius:6px;font-size:0.75rem;color:#7dd3fc">Hot   рҹ”ҙ (0вҖ“7 days)   : Active writes + reads (SSD)
Warm  рҹҹЎ (7вҖ“30 days)  : Read only (HDD, fast disk)
Cold  рҹ”ө (30вҖ“90 days) : Read only (cheap HDD/NAS)
Frozen вқ„пёҸ (90+ days)  : Archive to S3 / SmartStore
                          (pull on demand, аёҘаё” cost)</pre>
                <p style="margin-top:0.5rem"><strong>SmartStore:</strong> feature а№ғаё«аёЎа№Ҳаё—аёөа№Ҳаёўа№үаёІаёў cold bucket а№„аёӣ S3 аёӯаёұаё•а№ӮаёҷаёЎаёұаё•аёҙ вҖ” Indexer аёҲаё° cache а№ҖаёүаёһаёІаё° hot/warm а№„аё§а№үа№ғаёҷ local disk аёӣаёЈаё°аё«аёўаёұаё” storage а№„аё”а№ү 70%+</p>

         Slide engine
         в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
      let currentSlide = 0;
      const container = document.getElementById('slide-container');
      const progressBar = document.getElementById('progress-bar');
      const slideCounter = document.getElementById('slide-counter');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      slides.forEach((htmlContent, index) => {
        const div = document.createElement('div');
        div.className = 'slide';
        div.id = `slide-${index}`;
        div.innerHTML = htmlContent;
        container.appendChild(div);
      });

      function updateSlide() {
        document.querySelectorAll('.slide').forEach((el, index) => {
          el.classList.toggle('active', index === currentSlide);
        });
        btnPrev.disabled = currentSlide === 0;
        btnNext.disabled = currentSlide === slides.length - 1;
        const progress = ((currentSlide + 1) / slides.length) * 100;
        progressBar.style.width = `${progress}%`;
        slideCounter.textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
      }

      btnPrev.addEventListener('click', () => { if (currentSlide > 0) { currentSlide--; updateSlide(); } });
      btnNext.addEventListener('click', () => { if (currentSlide < slides.length - 1) { currentSlide++; updateSlide(); } });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) { currentSlide++; updateSlide(); }
        if (e.key === 'ArrowLeft' && currentSlide > 0) { currentSlide--; updateSlide(); }
        if (e.key === 'Escape') closeModal();
      });

      updateSlide();

      /* в•җв•җ Auto-scaling to fit screen в•җв•җ */
      function resizePresentation() {
        const container = document.querySelector('.presentation-container');
        if (!container) return;
        const scale = Math.min(window.innerWidth / 1200, window.innerHeight / 800);
        container.style.transform = `scale(${scale})`;
      }
      window.addEventListener('resize', resizePresentation);
      resizePresentation();
    </script>
